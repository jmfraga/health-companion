# fly.toml app configuration file generated for hc-companion-api on 2026-04-24T15:14:58-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hc-companion-api'
primary_region = 'sjc'
kill_signal = 'SIGINT'
kill_timeout = '15s'

[build]
  dockerfile = 'Dockerfile'

[env]
  DEBUG = 'false'
  ENVIRONMENT = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
